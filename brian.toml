# ──────────────────────────────────────────────────────────────────
# brian.toml — project configuration for BRIAN / NeuroSLM
#
# Single source of truth for "which architecture / DNA every training
# / deploy / colab script targets". Edit one field here and the whole
# training pipeline retargets.
#
# Schema (locked by tests/test_project_config.py +
# tests/test_hardware_aware_preset_selection.py +
# tests/test_brian_deploy_defaults.py):
#
#   [current]    arch, dna
#   [defaults]   preset, hardware, steps, branch
#   [hardware.<NAME>]  preset                ← per-hardware override
#   [nfg]        output, format, engine
#
# Precedence (2026-06-12, locked by tests):
#   1. CLI flag (--preset / --steps / --branch)  ← always wins
#   2. arch.neuro (any non-empty value)          ← beats brian.toml
#   3. brian.toml [hardware.<DETECTED>]          ← per-hardware override
#   4. brian.toml [defaults]                     ← workspace fallback
#   5. AUTO: detect hardware + pick by VRAM      ← last-ditch
#
# `brian deploy` resolution (2026-06-14, locked by
# tests/test_brian_deploy_defaults.py):
#   --steps:  CLI > [defaults].steps  > 10_000 hardcoded
#   --branch: CLI > [defaults].branch > leave unset (let _deploy_train.py
#             pick HEAD)
#   --dna:    CLI > [current].dna (when file exists) > DSL fallback
#
# `brian dna compile` resolution (2026-06-14):
#   positional arch: CLI positional > [current].arch
#   --output:        CLI > [current].dna (only when arch came from
#                    brian.toml too, never when a positional was given —
#                    so legacy `brian dna compile <other_arch>` does
#                    NOT silently retarget the deploy) > legacy default
#                    architectures/<arch>/evolution.dna
#
# Env-var overrides:
#   BRIAN_ARCH, BRIAN_DNA, BRIAN_DEFAULT_PRESET, BRIAN_DEFAULT_HARDWARE,
#   BRIAN_DEFAULT_STEPS, BRIAN_DEFAULT_BRANCH, BRIAN_NFG_OUTPUT,
#   BRIAN_NFG_FORMAT, BRIAN_NFG_ENGINE
# ──────────────────────────────────────────────────────────────────

[current]
# 2026-06-14: the bowtie arch folder was renamed rcc_bowtie → master
# (canonical source-of-truth), and architectures/current/ was added as
# the live working-copy that brian train/deploy consume by default.
arch = "architectures/master"
# 2026-06-15: DNA path mirrors the active git branch so a fork on
# `feature/X` never clobbers master's compiled DNA. The pre-deploy
# hook (hooks/pre-deploy.yaml) recompiles architectures/master into
# this exact path on every `brian deploy`, then unfolds back to
# architectures/current/arch.neuro so the working copy stays in sync.
dna = "./dna/master/arch.dna"

[defaults]
# Workspace-wide default preset (used only when no [hardware.<DETECTED>]
# entry matches AND arch.neuro is silent AND no --preset given).
preset = ""

# Active hardware. Empty = auto-detect via torch.cuda.
hardware = "A100"

# Default step count when neither --steps nor arch.neuro `steps:` is set.
steps = 10000

# Default branch for `brian deploy` when --branch is not given.
# Empty = let _deploy_train.py fall through to its own default (which
# resolves to the current git HEAD). Set to a real branch name to lock
# every unflagged deploy onto a known integration branch.
branch = "master"

# ── Checkpoint / log cadence ──
# Three INDEPENDENT cadences (all measured in training micro-steps):
#
#   log_every   → trainer prints a metrics row to stdout AND the
#                 background scripts/log_pusher.sh commits+pushes the
#                 live train.log to logs/vast/<YYYYMMDD>/<ARCH>/. The
#                 pusher polls every 30s and gates the push on the
#                 step crossing a log_every boundary, so what you see
#                 in ``brian logs`` is always at most one log_every
#                 stale (no wall-clock drift).
#   save_every  → trainer writes a local .pt checkpoint into
#                 lfs_checkpoints/<RUN>/step<N>.pt. Local only — does
#                 NOT push.
#   push_every  → trainer pushes the .pt to the remote backend
#                 (HuggingFace Hub by default, see push_backend below).
#                 Pure checkpoint cadence — does NOT touch logs. Set to
#                 0 to disable remote checkpoint pushes entirely.
#
# `push_every` was silently regressed to 0 during the DSL rewrite
# (the legacy train.py pushed after every save). We restore an
# explicit value here so a box self-destruction (H24 mode of failure)
# can never eat more than ~push_every steps of checkpoint progress.
log_every = 500
save_every = 500    
push_every = 2500

# ── Checkpoint push backend (2026-06-15) ──
# Default flipped from Git LFS to HuggingFace Hub after run 41063959
# hung at exactly step 500 — synchronous `git push` of a 569 MB LFS
# object inside the training loop raced the background log-pusher
# and never returned. HF Hub's single sync HTTPS PUT avoids the race.
#
# Values: "hf" (default), "lfs" (legacy), "none" (no remote push)
# Overridden by CHECKPOINT_PUSH_BACKEND env on the box, and by the
# --push_backend CLI flag of `python -m neuroslm.train_dsl`.
#
# `hf_repo_id` only used when push_backend = "hf".
push_backend = "hf"
hf_repo_id = "moritzroessler/BRIAN"

# ── push_optimizer (2026-06-15) ──
# When false (the default), the HF uploader strips Adam state (m+v)
# from each push. Saves ~2/3 of the upload size for a 107M trunk
# (1.4 GB → ~430 MB). Trade-off: a resume FROM A FRESH BOX off the HF
# copy shows a ~500-step LR-warmup-shape blip while Adam re-builds
# its 2nd-moment EMA from zero. Same-box crash resume is unaffected
# — the local lfs_checkpoints/.../step*.pt always has full state.
#
# Set to true if bandwidth is cheap and you want the HF copy to be a
# perfect resume target with no Adam warmup penalty.
push_optimizer = false

[hardware.A100]
preset = "large"

[hardware.T4]
preset = "t4_2k"

[hardware.RTX_3090]
preset = "cheap_2k"

[hardware.RTX_4090]
preset = "cheap_2k"

[hardware.CPU]
preset = "tiny"

[nfg]
output = ".neuro/nfg.png"
# Multi-format render: writes BOTH .png AND .svg in one compile so you
# can use PNG for inline previews / chat embeds and SVG for zooming
# without pixelation (SVG is vector, zooms infinitely crisp).
# Singular ``format = "png"`` still works for backcompat (= one-element list).
formats = ["png", "svg"]
# PNG rasterization DPI. Default 96 dpi looks pixelated when zooming;
# 150 dpi is ~1.56x sharper text/lines at the cost of ~2.4x file size.
# SVG ignores this (it's vector).
dpi = 150
# Layout engine — ``"fdp"`` is the cluster-aware force-directed
# (spring) layout. It draws the anatomical region bounding boxes
# AND lets spring forces arrange the nodes inside each cluster, so
# cyclic / heavily-interconnected architectures (like the master
# bowtie with 23 modulation cycles) don't fight the layout. ``"dot"``
# is the hierarchical alternative — better for strict DAGs but
# requires manual rank=same forcing for wide clusters. ``"neato"``
# and ``"sfdp"`` are also force-directed but IGNORE clusters (the
# anatomical region boxes disappear).
engine = "fdp"
