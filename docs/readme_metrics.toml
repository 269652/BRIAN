# docs/readme_metrics.toml — single source of truth for all empirical
# numbers that appear in README.md.
#
# Update this file whenever a new training run produces new results.
# Then run `brian update-readme` to regenerate README.md.
# The pre-commit hook enforces that README.md is always in sync.
#
# All values MUST be strings (quoted).  Numeric-looking values are stored
# as strings so the renderer substitutes them verbatim without float
# formatting surprises (e.g. 66.0 stays "66.0", not "66").

# ── meta ──────────────────────────────────────────────────────────────
